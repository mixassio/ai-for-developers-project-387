# Render Blueprint: один веб-сервис из корневого Dockerfile.
# Render сам подставляет переменную PORT — приложение её читает (backend/src/index.ts).
services:
  - type: web
    name: calendar-of-calls
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    autoDeploy: true
